# =============================================================================
# CD — Insurance Pricing ML Pipeline
# Triggers ONLY on merge to main (not on every push/PR).
#
# GAP 1 FIX: Previously only the `prod` (api) target was built and pushed.
# All four Dockerfile targets are now built and published to GHCR:
#   prod           → ghcr.io/<repo>-api:latest
#   mlflow         → ghcr.io/<repo>-mlflow:latest
#   optuna         → ghcr.io/<repo>-optuna:latest
#   streamlit-prod → ghcr.io/<repo>-streamlit:latest
#
# BUILD ORDER
# ───────────
# 1. Build api (prod target) — load locally, do NOT push yet.
# 2. Smoke test api — assert GET /health returns HTTP 200.
# 3. Push api — only if smoke test passes.
# 4. Build and push mlflow, optuna, streamlit-prod — no smoke test needed
#    (CPU-only services with no model load path; they are always healthy if
#    the process starts, which the build step already validates).
#
# IMAGE NAMING
# ────────────
#   ghcr.io/<owner>/<repo>-api:latest        API (FastAPI + GPU)
#   ghcr.io/<owner>/<repo>-mlflow:latest     MLflow tracking server
#   ghcr.io/<owner>/<repo>-optuna:latest     Optuna dashboard
#   ghcr.io/<owner>/<repo>-streamlit:latest  Streamlit dashboard
#
# Each image is also tagged:
#   :sha-<7chars>  — immutable pinned tag for rollback
#   :<branch>      — branch label (main)
#
# SMOKE TEST SCOPE
# ────────────────
# The smoke test asserts HTTP 200 from GET /health (image availability gate).
# It does NOT assert status=healthy in the JSON body because the smoke
# container starts without model volume mounts — models/ is empty, so
# app.state.pipeline is None and /health intentionally returns
# {"status":"unhealthy"} with HTTP 200 (routes.py health_check behavior).
#
# The status=healthy assertion requires model artifacts and belongs in an
# integration test run with docker-compose volumes mounted:
#   make smoke-test  (runs compose up with real volumes)
#
# ACTIONS PIN POLICY
# ──────────────────
# All actions pinned to full commit SHAs. Mutable version tags (e.g. @v4)
# can be silently updated by an upstream attacker to run malicious code with
# secrets.GITHUB_TOKEN access. Dependabot opens PRs when new versions appear.
#
# SHA table (verify with gh before upgrading):
#   actions/checkout@v4.2.2          : 11bd71901bbe5b1630ceea73d27597364c9af683
#   docker/setup-buildx-action@v3.8.0: f95db51fddba0c2d1ec667646a06c2ce06100226
#   docker/login-action@v3.3.0       : 9780b0c442fbb1117ed29e0efdff1e18412f7567
#   docker/metadata-action@v5.6.1    : 369eb591f429131d6889c46b94e711f089e6ca96
#   docker/build-push-action@v5.4.0  : 4f58ea79222b3b9dc2c8bbdd6debcef730109a75
# =============================================================================

name: CD

on:
  push:
    branches: [main]
  # Allow re-triggering a deploy without a code push
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build → Smoke Test → Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v3.8.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV


      # ──────────────────────────────────────────────────────────────────────
      # API IMAGE (prod target)
      # Build locally first — smoke test before pushing to registry.
      # ──────────────────────────────────────────────────────────────────────

      - name: Extract metadata — api
        id: meta-api
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      # Build without push — loaded into local daemon for smoke test.
      - name: Build api image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v5.4.0
        with:
          context: .
          file: docker/Dockerfile
          target: prod
          push: false
          load: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ──────────────────────────────────────────────────────────────────────
      # SMOKE TEST
      # Verifies the api image starts and /health returns HTTP 200.
      # Push is blocked if this fails — no broken image ever reaches GHCR.
      # ──────────────────────────────────────────────────────────────────────

      - name: Prepare env file for smoke test
        run: cp .env.example .env.docker

      - name: Start api container for smoke test
        run: |
          docker run -d \
            --name insurance-api-smoke \
            --env-file .env.docker \
            -e CUDA_VISIBLE_DEVICES="" \
            -e STRICT_AUTH="false" \
            -p 8000:8000 \
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}-api:latest

      - name: Wait for API to be ready (max 45s)
        run: |
          echo "Waiting for API on port 8000..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API responded after attempt $i"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "API did not respond within 45 seconds"
              docker logs insurance-api-smoke
              exit 1
            fi
            sleep 3
          done

      - name: Assert /health returns HTTP 200 (image availability gate)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "SMOKE TEST FAILED: /health returned HTTP $HTTP_STATUS"
            docker logs insurance-api-smoke
            exit 1
          fi
          echo "HTTP status: $HTTP_STATUS ✅"
          echo "Note: status=healthy requires model volume mounts."
          echo "Run 'make smoke-test' for the full integration health check."

      - name: Print health response body (informational)
        run: |
          BODY=$(curl -s http://localhost:8000/health)
          echo "Health response: $BODY"
          STATUS=$(echo "$BODY" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" \
            2>/dev/null || echo "parse-error")
          echo "Service status: $STATUS (expected 'unhealthy' without model volumes)"

      - name: Collect container logs on failure
        if: failure()
        run: docker logs insurance-api-smoke || true

      - name: Stop and remove smoke test container
        if: always()
        run: docker rm -f insurance-api-smoke || true


      # ──────────────────────────────────────────────────────────────────────
      # PUSH API IMAGE
      # Only reached if smoke test passes.
      # Uses GHA layer cache — fast rebuild, no re-download of base layers.
      # ──────────────────────────────────────────────────────────────────────

      - name: Push api image to GHCR
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v5.4.0
        with:
          context: .
          file: docker/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ──────────────────────────────────────────────────────────────────────
      # MLFLOW IMAGE
      # FROM python:3.11-slim — CPU-only, no CUDA. ~200–300 MB.
      # No smoke test needed: no model load path, process start == healthy.
      # ──────────────────────────────────────────────────────────────────────

      - name: Extract metadata — mlflow
        id: meta-mlflow
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-mlflow
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push mlflow image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v5.4.0
        with:
          context: .
          file: docker/Dockerfile
          target: mlflow
          push: true
          tags: ${{ steps.meta-mlflow.outputs.tags }}
          labels: ${{ steps.meta-mlflow.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ──────────────────────────────────────────────────────────────────────
      # OPTUNA IMAGE
      # FROM python:3.11-slim — CPU-only, no CUDA. ~150–200 MB.
      # ──────────────────────────────────────────────────────────────────────

      - name: Extract metadata — optuna
        id: meta-optuna
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-optuna
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push optuna image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v5.4.0
        with:
          context: .
          file: docker/Dockerfile
          target: optuna
          push: true
          tags: ${{ steps.meta-optuna.outputs.tags }}
          labels: ${{ steps.meta-optuna.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ──────────────────────────────────────────────────────────────────────
      # STREAMLIT IMAGE (streamlit-prod target)
      # FROM python:3.11-slim — no CUDA, no torch. ~2.5–3 GB.
      # Only calls http://api:8000 — no model files loaded directly.
      # ──────────────────────────────────────────────────────────────────────

      - name: Extract metadata — streamlit
        id: meta-streamlit
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-streamlit
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push streamlit image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v5.4.0
        with:
          context: .
          file: docker/Dockerfile
          target: streamlit-prod
          push: true
          tags: ${{ steps.meta-streamlit.outputs.tags }}
          labels: ${{ steps.meta-streamlit.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ──────────────────────────────────────────────────────────────────────
      # SUMMARY
      # ──────────────────────────────────────────────────────────────────────

      - name: Print published image tags
        run: |
          echo "### Published Images" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "api:       ${{ steps.meta-api.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "mlflow:    ${{ steps.meta-mlflow.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "optuna:    ${{ steps.meta-optuna.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "streamlit: ${{ steps.meta-streamlit.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull commands:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.REPO_LC }}-api:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.REPO_LC }}-mlflow:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.REPO_LC }}-optuna:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.REPO_LC }}-streamlit:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
