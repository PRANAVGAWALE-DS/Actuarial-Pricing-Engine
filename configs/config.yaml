# ====================================================
# API CONFIGURATION
# ====================================================
api:
  host: 127.0.0.1
  port: 8000
  workers: 1  # Multiple workers fork the process; each fork loads all joblib models (~800MB each). Keep at 1 on 16GB RAM.
  reload: false
  log_level: info
  model_cache: true
  model_cache_size: 2
  warm_up_on_start: true

  # M-10 NOTE: this block is currently NOT consumed by any server-side code.
  # routes.py uses only a threading.Semaphore (_MAX_CONCURRENT) for overload
  # protection — a global cap with no per-client fairness.  A single abusive
  # caller can exhaust all semaphore slots and starve other users.
  # These parameters are placeholders for a future per-client rate-limiter
  # (e.g. slowapi + Redis, or an ASGI middleware).  Do NOT assume they are
  # enforced in production.  api.host=127.0.0.1 limits exposure for now.
  rate_limit:
    enabled: false    # ← has no effect; no middleware reads this key yet
    requests: 100
    period: 60

  metrics:
    enabled: true
    # M-09 FIX: corrected from '/metrics' (wrong — HTTP 404) to the actual
    # FastAPI route registered in routes.py.  Any scrape config or operator
    # script reading this key now targets the correct path.
    # Note: the Prometheus text-format scrape endpoint is separate:
    #   /metrics/prometheus  (only available when prometheus-client is installed)
    endpoint: /api/v1/metrics
    prometheus_endpoint: /metrics/prometheus

# ====================================================
# STREAMLIT CONFIGURATION
# ====================================================
streamlit:
  host: 127.0.0.1
  port: 8501

  server:
    maxUploadSize: 200
    enableXsrfProtection: true

  performance:
    caching: true
    cache_ttl: 3600