version: 7.5.0-50k

# ====================================================
# INSURANCE ML SYSTEM - CONFIGURATION v7.5.0-50k
# Scaled from v7.5.0 (1300 samples) → 50k+ samples
# Compatible with Windows 11 + 16GB RAM + RTX 3050 4GB
# ====================================================

# ====================================================
# GLOBAL DEFAULTS
# ====================================================
defaults:
  random_state: &random_state 42  # Referenced throughout as *random_state
  n_jobs: -1                      # Required by config.py validator. -1 = use all CPU cores.

environment: production

# ====================================================
# PREDICTION CONFIGURATION
# ====================================================
prediction:
  # T3-C (v7.5.0): max batch size is now config-driven.
  # PredictionPipeline.predict() and HybridPredictor.predict() both read this key.
  # Default 10,000 is appropriate for interactive/API use.
  # Raise for portfolio re-pricing runs (e.g. 50,000+ at renewal).
  # Each prediction requires ~6KB RAM; 50K policies ≈ 300MB — safe on 16GB.
  # v7.5.0→50k: raised from 10000 to match full portfolio size.
  max_batch_size: 50000
  # Threshold above which predict_single() emits a high-prediction warning.
  # Aligns with actuarial upper bound for individual policy pricing.
  # Raise for commercial/group portfolios where premiums legitimately exceed $100K.
  extreme_prediction_threshold: 100000

# ====================================================
# HARDWARE SPECIFICATIONS
# ====================================================
hardware:
  gpu_model: RTX_3050
  total_vram_mb: 4096
  recommended_vram_limit_mb: 3900  # ⚠️ INFORMATIONAL ONLY — not enforced by any runtime code. The operative VRAM ceiling is gpu.memory_limit_mb (see §GPU CONFIG below). Do not use this key in operator scripts or Dockerfiles.
  max_safe_vram_mb: 4096
  min_safe_vram_mb: 1024
  total_ram_gb: 16
  cpu_cores: 8

# ====================================================
# VALIDATION PARAMETERS
# ====================================================
validation:
  contamination_min: 0.0
  contamination_max: 0.5
  vif_min: 0.0
  polynomial_degree_min: 1
  valid_xgboost_devices: [cuda:0, cuda, gpu]
  valid_target_transform_methods: [none, log1p, yeo-johnson, boxcox]
  weight_sum_tolerance: 0.01

# ====================================================
# CROSS-VALIDATION
# ====================================================
cross_validation:
  n_folds: 5
  shuffle: true
  stratified: true
  random_state: *random_state

# ====================================================
# GPU CONFIGURATION (OPTIMIZED FOR RTX 3050 4GB)
# ====================================================
gpu:
  enabled: true
  device_id: 0
  # FIX U-14: memory_limit_mb is actively used by ModelManager but is never
  # validated against hardware.total_vram_mb (4096 MB) at startup.  Setting
  # this above total_vram_mb silently overcommits VRAM and causes OOM crashes.
  # RULE: memory_limit_mb MUST be ≤ hardware.total_vram_mb (4096).
  # Recommended ceiling: hardware.recommended_vram_limit_mb (3900) to leave
  # headroom for CUDA context and driver overhead.
  memory_limit_mb: 3400
  memory_fraction: 0.83
  validate_memory: true
  monitor_usage: true
  log_memory_stats: true
  warn_threshold_mb: 600

  xgboost:
    device: cuda:0
    tree_method: hist
    n_jobs: 1
    max_bin: 2048
    sampling_method: gradient_based
    grow_policy: lossguide
    max_cached_hist_node: 4096  # 50k-scale: raised from 1024. More data + wider bins (max_bin=2048)
                                # means more histogram nodes benefit from cache. 1024 was right-sized
                                # for max_leaves≤25 on ~1300 samples; 4096 covers 50k histogram depth.

  # ── NEW (v7.5.0): Pricing model — symmetric squared-error ─────────────────
  xgboost_median:
    device: cuda:0              # v7.5.2: added. Missing key caused ~250 redundant log msgs/run.
    tree_method: hist           # v7.5.5 PATCH-C: explicit GPU histogram.
                                # Without this, XGBoost silently falls back to CPU on large
                                # datasets (observed: GPU memory -7MB instead of +N MB at fold 0).
                                # Must match gpu.xgboost.tree_method to keep both models on GPU.
    objective: reg:squarederror
    eval_metric: rmse
    random_state: *random_state
    n_jobs: 1
    n_estimators: 1000
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 50      # 50k-scale: raised from 5. At 1300 samples MCW=5 ≈ 0.4% of data.
                              # At 50k MCW=5 ≈ 0.01% — near-zero regularization. 50 ≈ 0.1% of 50k train set.
    reg_alpha: 0.1
    reg_lambda: 1.0

  lightgbm:
    device: gpu
    gpu_platform_id: 0
    gpu_device_id: 0
    n_jobs: 1
    max_bin: 255
    gpu_use_dp: false

  fallback_to_cpu: true
  cpu_fallback_on_oom: true
  retry_with_reduced_params: true

# ====================================================
# LOGGING CONFIGURATION
# ====================================================
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: logs/app.log
  console_level: INFO
  file_level: DEBUG

# ====================================================
# DATA CONFIGURATION
# ====================================================
data:
  raw_path: data/raw/insurance.csv
  processed_path: data/processed/
  target_column: charges
  test_size: 0.2
  random_state: *random_state
  validation_strategy: cv

# ====================================================
# FEATURE ENGINEERING - BALANCED APPROACH
# ====================================================
features:
  bmi_min: 10.0
  bmi_max: 100.0
  # M-04 FIX: raised from 0.0 to 18.0.
  # The API enforces age >= 18 (schemas.py PredictRequest ge=18) for policy-holders.
  # With age_min=0.0 any tool calling PredictionPipeline or HybridPredictor directly
  # (notebooks, scripts, evaluate.py) bypassed the age floor entirely — a child-age
  # prediction would silently produce a premium.  Both layers now agree on 18.
  age_min: 18.0
  age_max: 120.0
  children_min: 0    # F-08: lower bound for children validation
  children_max: 20   # F-08: upper bound for children validation

  categorical_features: [sex, smoker, region]
  numerical_features: [age, bmi, children]

  encoding:
    smoker_binary_map:
      "yes": 1
      "no": 0
    smoker_risk_map:
      "yes": 2
      "no": 0

  scaling_method: standard

  engineering:
    variance_threshold: 0.000001
    encoding_method: onehot
    handle_outliers: false
    outlier_method: isolationforest
    create_interactions: true

  target_transform:
    method: yeo-johnson
    clip_extreme_predictions: true
    clip_quantile_low: 0.005
    clip_quantile_high: 0.995
    buffer_pct: 0.40
    add_buffer: true

    bias_correction:
      enabled: true
      use_validation_residuals: true
      apply_multiplicative_factor: false

    extrapolation:
      allow: true
      max_percent_beyond_training: 40.0
      warn_threshold: 20.0

  outlier_removal:
    enabled: false
    method: isolation_forest
    contamination: 0.02
    remove_from_validation: false
    document_removed_outliers: true
    random_state: *random_state

  # MODERATED polynomial features
  polynomial_features:
    enabled: false
    degree: 2
    interaction_only: true
    include_bias: false
    max_features: 100
    selection_method: mutual_info

  # Slightly stricter collinearity removal
  collinearity_removal:
    enabled: true
    threshold: 0.90
    vif_threshold: 10.0  # v7.5.2: raised from 5.0. The $14K-$16.7K zone (High+ segment)
                         # has R²=-29.83 because VIF=5.0 removed smoker_bmi_squared (VIF=7.8)
                         # and chronic_condition_proxy (VIF=6.0) — the only features that
                         # distinguish smoker vs non-smoker populations producing similar
                         # charges in this transition zone. Raising to 10.0 preserves
                         # these features while still removing age_bmi (VIF=227.6) and
                         # age_bmi_smoker_interaction (VIF=28.2).
    vif_check_polynomial_features: true
    max_vif_iterations: 10
    use_optimized_vif: true

  monitoring:
    enabled: true
    log_extrapolation_warnings: true
    max_extrapolation_percent: 20.0

# ====================================================
# SAMPLE WEIGHTING - CRITICAL REBALANCING
# 🎯 Goal: Balance low-value and high-value accuracy
# ====================================================
sample_weights:
  enabled: true
  method: progressive_log

  tiers:
    q25_to_q50: 1.0
    q50_to_q75: 1.05
    q75_to_q90: 1.15
    # ISSUE 5 FIX: High-value segment R²=0.605 vs overall 0.918 — model severely
    # under-attends to the expensive tail. Previous top-tier weights (1.30/1.40/1.50)
    # were insufficient: best trial barely moved predictions toward high-cost cases.
    # Increased top three tiers to push training loss toward tail accuracy.
    # max_weight=2.0 cap (below) prevents any single sample dominating gradients.
    q90_to_q95: 1.50   # was 1.30
    q95_to_q99: 1.70   # was 1.40
    # FIX M5: restored to 2.00 (was incorrectly reduced to 1.50 in v7.5.2).
    # above_q99=1.50 was LOWER than q95_to_q99=1.70, creating a non-monotonic
    # weight profile where the costliest 1% of policies received LESS training
    # emphasis than the tier immediately below them.  The original rationale
    # (prevent double-counting with quantile loss) is handled by max_weight=2.0
    # cap below — no need to reduce the tier weight itself.
    # The VH segment R²=-2.01 issue is partly attributable to this non-monotonicity.
    above_q99: 2.00    # was 1.50 (non-monotonic bug); capped by max_weight=2.0 below

  max_weight: 2.0
  smoothing_factor: 0.3
  transform: none

# ====================================================
# MODEL CONFIGURATION
# ====================================================
model:
  models: ["xgboost_median", "xgboost", "linear_regression", "lightgbm", "random_forest"]
  
  # ["xgboost_median", "xgboost", "linear_regression", "ridge", "lasso",
          #  "gradient_boosting", "svr", "knn", "lightgbm", "elastic_net", "random_forest"]

  metric: neg_root_mean_squared_error
  model_path: models/
  random_state: *random_state
  n_jobs: -1

  metric_mapping:
    sklearn: neg_root_mean_squared_error
    xgboost: quantile                # matches objective: "reg:quantileerror"
    # FIX F-15: xgboost_median was absent — optuna_optimizer.py metric lookup
    # fell back to an undefined default when building the study for this model.
    # reg:squarederror (symmetric RMSE) → rmse is the correct Optuna metric.
    xgboost_median: rmse             # matches objective: "reg:squarederror"
    lightgbm: quantile               # matches objective: "quantile"

  early_stopping_rounds: 50

# ====================================================
# MODEL HYPERPARAMETERS
# 🎯 Goal: Prevent overfitting, improve generalization
# ====================================================
models:

  linear_regression:
    # No hyperparameters to tune for basic linear regression
    # Used as baseline comparison
    fit_intercept: true
    n_jobs: -1

  ridge:
    random_state: *random_state
    fit_intercept: true
    max_iter: 10000
    solver: auto

    alpha:
      type: float
      low: 0.01
      high: 100.0
      log: true

    # Optional: Tune solver for large datasets
    # solver:
    #   type: "categorical"
    #   choices: ["auto", "svd", "cholesky", "lsqr", "sparse_cg", "sag", "saga"]

  lasso:
    random_state: *random_state
    fit_intercept: true
    max_iter: 10000
    selection: cyclic

    alpha:
      type: float
      low: 0.001
      high: 10.0
      log: true

    # For faster convergence on your hardware
    tol:
      type: float
      low: 0.0001
      high: 0.01
      log: true

  elastic_net:
    # ── QUANTILE REGRESSOR (swapped from ElasticNet at factory level in models.py) ──
    # QuantileRegressor does NOT support random_state — intentionally omitted.
    # 'alpha' here is L1 regularization strength, NOT the quantile level.
    # 'quantile' is the target percentile (0.60 = 60th percentile, matches LightGBM/XGB).
    fit_intercept: true
    max_iter: 50000  # v7.5.4: raised from 10000 — ConvergenceWarning on 20+ folds
    # random_state intentionally omitted — QuantileRegressor has no such parameter

    quantile: 0.60              # target quantile level (fixed; not tuned by Optuna)

    alpha:                      # L1 regularization strength (Optuna tunes this)
      type: float
      low: 0.001
      high: 10.0
      log: true

    solver:
      type: categorical
      choices: [highs]

  # ====================================================
  # GRADIENT BOOSTING (sklearn) - Conservative Settings
  # ====================================================

  gradient_boosting:
    random_state: *random_state
    verbose: 0
    n_jobs: -1
    validation_fraction: 0.1
    n_iter_no_change: 10
    tol: 0.0001
    objective: quantile 

    loss:
      type: categorical
      choices: [quantile]       # quantile (pinball) loss; was ["squared_error", "absolute_error", "huber"]

    n_estimators:
      type: int
      low: 100
      high: 500
      step: 100

    learning_rate:
      type: float
      low: 0.01
      high: 0.2
      log: true

    max_depth:
      type: int
      low: 3
      high: 7

    min_samples_split:
      type: int
      low: 100   # 50k-scale: raised from 10. Absolute count; 10/50k = 0.02% — no regularization effect.
      high: 500  # was 50

    min_samples_leaf:
      type: int
      low: 50    # 50k-scale: raised from 5.
      high: 200  # was 30

    subsample:
      type: float
      low: 0.6
      high: 0.95

    max_features:
      type: categorical
      choices: [sqrt, log2, 0.5, 0.7, 0.9]

    # Regularization parameters
    ccp_alpha:
      type: float
      low: 0.0
      high: 0.1

    # alpha controls the quantile level when loss="quantile" (was for huber: 0.8–0.95)
    # Fixed constant (v7.4.3) — NOT a search range. Optuna must not tune this.
    alpha: 0.65

  # ====================================================
  # SUPPORT VECTOR REGRESSOR - Memory-Conscious
  # ====================================================

  svr:
    # SVR is memory-intensive; constrain complexity
    max_iter: 10000
    cache_size: 1000  # MB - adjust for your 16GB RAM

    kernel:
      type: categorical
      choices: [rbf, linear, poly]

    C:
      type: float
      low: 0.1
      high: 100.0
      log: true

    epsilon:
      type: float
      low: 0.01
      high: 1.0
      log: true

    # For RBF and polynomial kernels
    gamma:
      type: categorical
      choices: [scale, auto]

    # Only for polynomial kernel
    degree:
      type: int
      low: 2
      high: 4

    # Regularization
    tol:
      type: float
      low: 0.0001
      high: 0.01
      log: true

  # ====================================================
  # K-NEAREST NEIGHBORS - Efficient for Small Datasets
  # ====================================================

  knn:
    n_jobs: -1

    n_neighbors:
      type: int
      low: 3
      high: 50

    weights:
      type: categorical
      choices: [uniform, distance]

    algorithm:
      type: categorical
      choices: [auto, ball_tree, kd_tree, brute]

    leaf_size:
      type: int
      low: 20
      high: 50

    p:
      type: int
      low: 1
      high: 2

    # Distance metrics
    metric:
      type: categorical
      choices: [euclidean, manhattan, minkowski]

  # ── v7.5.0: Pricing model (symmetric squared-error) ─────────────────────
  # Objective declared here so load_model() can verify it on load.
  # Must match: gpu.xgboost_median.objective AND
  #             optuna.constrained_params.xgboost_median.objective
  # Without this key, load_model() cfg_obj=None → verification silently
  # skipped → any model/config mismatch goes undetected at load time.
  xgboost_median:
    objective: reg:squarederror     # symmetric loss; must match gpu + constrained_params
    random_state: *random_state
    n_jobs: 1

  xgboost:
    random_state: *random_state
    n_jobs: 1
    objective: reg:quantileerror     # quantile (pinball) loss; was "reg:squarederror"
    quantile_alpha: 0.30             # v7.5.4: lowered from 0.57.
                                     # YJ nonlinearity: α=0.57 in log-space → ~78% overpricing
                                     # in dollar-space (target: [47%, 67%]). G7 gate failed at
                                     # 74.5%. Empirical mapping: α_dollar ≈ α_log + 0.20 for
                                     # this dataset's skew (skew=+2.87, kurtosis=+9.06).
                                     # α=0.45 in log-space targets ~65% in dollar-space — within
                                     # the [47%, 67%] tolerance band.
                                     # Monitor: if rate<47% → nudge to 0.48; if rate>67% → 0.42.

    n_estimators:
      type: int
      low: 400
      high: 800
      step: 100

    max_depth:
      type: int
      low: 3
      high: 5

    learning_rate:
      type: float
      low: 0.03
      high: 0.12
      log: true

    subsample:
      type: float
      low: 0.6
      high: 0.9

    colsample_bytree:
      type: float
      low: 0.5
      high: 0.8

    colsample_bylevel:
      type: float
      low: 0.4
      high: 0.7

    colsample_bynode:
      type: float
      low: 0.4
      high: 0.7

    gamma:
      type: float
      low: 2.0
      high: 5.0

    reg_alpha:
      type: float
      low: 3.0
      high: 12.0
      log: true

    reg_lambda:
      type: float
      low: 8.0
      high: 25.0
      log: true

    min_child_weight:
      type: int
      low: 50    # 50k-scale: raised from 15. Absolute count; 15/50k = 0.03% = near-zero leaf guard.
      high: 300  # was 35

    max_bin:
      type: int
      low: 512   # 50k-scale: raised from 1024 (floor). Old comment: CV folds ~640 rows capped effective
      high: 2048 # bins to 200-400 so [1024,2048] wasted budget. At 50k each fold ~40k rows; full range used.

    max_leaves:
      type: int
      low: 10
      high: 25

    # IMPORTANT — NOT TUNED BY OPTUNA (v7.4.4):
    # For tree models (xgboost, lightgbm, random_forest), the Optuna objective uses
    # _suggest_constrained_params() which reads EXCLUSIVELY from
    # optuna.constrained_params.xgboost — NOT from this models.xgboost block.
    # Tunable type:/choices: dicts defined here for tree models are silently ignored.
    # grow_policy and sampling_method are fixed by gpu.xgboost (lossguide /
    # gradient_based) and are intentionally absent from constrained_params.xgboost.
    grow_policy: lossguide             # fixed by gpu.xgboost; not a search range
    sampling_method: gradient_based    # fixed by gpu.xgboost; not a search range

    # scale_pos_weight: binary classification only — incompatible with
    # reg:quantileerror. Defined here for documentation; never passed to the model
    # (optuna_optimizer._filter_xgb_quantile_params() strips it, and it has been
    # removed from constrained_params.xgboost so Optuna never suggests it).
    # scale_pos_weight: 1.0

  lightgbm:
    random_state: *random_state
    n_jobs: 1
    verbose: -1
    force_col_wise: true
    objective: quantile              # quantile (pinball) loss
    alpha: 0.65                      # FIXED quantile level (v7.4.3) — Optuna does NOT tune this.
                                     # Was tunable [0.58,0.70] but RMSE objective always pulled it
                                     # to the floor, effectively reverting to near-median loss.

    # IMPORTANT — NOT TUNED BY OPTUNA (v7.4.4): same constraint as models.xgboost —
    # constrained_params.lightgbm is the sole source for Optuna. boosting_type is absent
    # there, so LightGBM defaults to "gbdt" every trial regardless of this definition.
    # "goss" is also deprecated in LightGBM >= 4.0 (merged into "gbdt" via data_sample_strategy).
    # Left here for documentation only; do NOT add to constrained_params without removing "goss".
    boosting_type: gbdt    # fixed default; was categorical [gbdt, dart, goss] — see note above

    n_estimators:
      type: int
      low: 200
      high: 800
      step: 200

    learning_rate:
      type: float
      low: 0.01
      high: 0.05
      log: true

    max_depth:
      type: int
      low: 5
      high: 8

    num_leaves:
      type: int
      low: 31
      high: 63

    min_data_in_leaf:
      type: int
      low: 50    # 50k-scale: raised from 5. At 50k, min_data=5 is 0.01% of training set — no regularization.
      high: 500  # was 60

    # min_child_samples REMOVED (v7.4.4) — alias for min_data_in_leaf.
    # LightGBM >= 3.0 raises LightGBMError: "Found duplicated parameter"
    # when both are passed. Kept min_data_in_leaf (canonical); range now [5,60].

    min_split_gain:
      type: float
      low: 0.0
      high: 0.15

    subsample:
      type: float
      low: 0.7
      high: 1.0

    subsample_freq:
      type: int
      low: 0
      high: 10

    colsample_bytree:
      type: float
      low: 0.7
      high: 1.0

    reg_alpha:
      type: float
      low: 1.0
      high: 5.0

    reg_lambda:
      type: float
      low: 3.0
      high: 8.0
      log: true

    min_child_weight:
      type: float
      low: 0.001
      high: 10.0
      log: true

  random_forest:
    random_state: *random_state
    n_jobs: -1
    verbose: 0
    oob_score: true
    warm_start: false

    n_estimators:
      type: int
      low: 200
      high: 500
      step: 100

    max_depth:
      type: int
      low: 5
      high: 15

    min_samples_split:
      type: int
      low: 100   # 50k-scale: raised from 10.
      high: 500  # was 50

    min_samples_leaf:
      type: int
      low: 50    # 50k-scale: raised from 5.
      high: 200  # was 20

    max_features:
      type: categorical
      choices: [sqrt, log2, 0.5, 0.7]

    bootstrap:
      type: categorical
      choices: [true]

    # Regularization
    ccp_alpha:
      type: float
      low: 0.0
      high: 0.01

    min_weight_fraction_leaf:
      type: float
      low: 0.0
      high: 0.1

# ====================================================
# OPTUNA CONFIGURATION - REBALANCED OBJECTIVES
# 🎯 Goal: Optimize for ALL segments, not just high-value
# ====================================================
optuna:
  enabled: true
  # M-03 FIX: raised from 1 to 50.
  # With n_trials=1 and n_startup_trials=10, TPE never activated — Optuna ran
  # exactly one random-sample trial and returned the default hyperparameters.
  # n_trials MUST exceed n_startup_trials for TPE to have any budget.
  # 50k-scale: raised from 50 to 75. Each trial is ~2-3× slower at 50k (8–20 min/trial on RTX 3050).
  # Budget: 15 random startup + 60 TPE-guided = adequate exploration for this search space at scale.
  n_trials: 75
  # 50k-scale: raised from 10800 (3h) to 21600 (6h) to accommodate slower per-trial cost.
  timeout: 21600
  n_jobs: 1  # ← IMPORTANT: Keep at 1 for Optuna itself
  # Each trial will use all cores via model n_jobs=-1
  random_state: *random_state

  # 50k-scale: set true. KBinsDiscretizer(strategy="quantile") works robustly at 50k+;
  # stratified folds prevent any fold from accidentally over-representing the VH tail segment.
  cv_stratified: true   # was false (safe only at small n; at 50k stratification is cost-free and robust)
  cv_n_folds: 5         # mirrors cross_validation.n_folds
  cv_shuffle: true      # mirrors cross_validation.shuffle

  # Why n_jobs=1 for Optuna but n_jobs=-1 for models?
  # - Optuna n_jobs controls parallel trials
  # - Model n_jobs controls parallel operations within each trial
  # - Running parallel trials with all-core models = memory explosion
  # - Sequential trials + all-core models = optimal for your hardware

  enhanced_scoring:
    enabled: true
    mode: hybrid

    # Per-model scoring mode overrides.
    # Quantile models must use pinball_only — the hybrid mode's RMSE component
    # (standard weight=0.70) biases hyperparameter selection toward mean-predicting
    # configurations, inflating the effective quantile above alpha regardless of
    # the alpha setting. Measured: alpha=0.57 + hybrid mode → 73% overpricing.
    # With pinball_only, Optuna selects params that minimise pinball loss only,
    # converging to the correct quantile level.
    model_mode_overrides:
      xgboost: pinball_only          # quantile model — pure pinball scoring
      xgboost_median: hybrid         # squarederror model — hybrid is correct
      lightgbm: pinball_only       
      gradient_boosting: pinball_only

    weighted:
      high_value_multiplier: 1.5
      threshold_percentile: 75.0
      very_high_percentile: 90.0   # FIX NEW-B: was 5.0 (5th percentile = cheapest policies!).
      # 90.0 → top 10% of policies receive the 2.7× boost weight as intended.
      # At 5.0 the very_high tier covered 95% of portfolio, collapsing into uniform RMSE.
      very_high_penalty_boost: 1.8

    balanced:
      n_segments: 4

    hybrid_weights:
      standard: 0.70
      weighted: 0.15
      balanced: 0.15

  high_value_percentile: 75
  high_value_penalty: 1.5

  sampler:
    type: tpe
    n_startup_trials: 15   # 50k-scale: raised from 10. Wider effective search space (min_child_weight
                           # range expanded 3-20×) benefits from more random exploration before TPE fits.
    multivariate: true
    seed: *random_state

  pruner:
    type: median
    n_startup_trials: 10   # v7.4.5-fix5: was 20. MedianPruner skips ALL trials below this
                           # count entirely. At 20, 20% of the 100-trial budget ran without
                           # any pruning protection, and the remaining 80 trials only had
                           # the n_warmup_steps window. Reducing to 10 allows the pruner
                           # to start cutting bad trials earlier in the study.
    n_warmup_steps: 1      # v7.4.5-fix5: was 3. With 5 folds (steps 0-4), n_warmup_steps=3
                           # meant the pruner could only fire at steps 3 or 4. Observed
                           # "Avg pruning at: Fold 5.0/5" confirmed it never fired before
                           # the final fold — zero compute was saved across all 22 pruned
                           # trials. At n_warmup_steps=1, the pruner activates from step 2
                           # onwards, potentially saving 2-3 folds per bad trial.
    interval_steps: 1

    hyperband:
      min_resource: 1
      max_resource: 3
      reduction_factor: 3

  early_stopping:
    enabled: true
    patience: 25        # 50k-scale: reduced from 40. patience=40 on 75 trials = 53% of budget on a plateau.
                        # 25/75 = 33% — still generous while protecting the remaining trial budget.
    min_improvement: 0.0005

  overfitting:
    penalty_enabled: true
    # v7.4.5-fix4 RECALIBRATION: old values (warning=6, critical=12, mult=6.0)
    # were designed for dollar-space RMSE. Pinball loss in Yeo-Johnson space
    # sits ~0.20-0.25; a 6-12% gap there is normal generalization noise, NOT
    # overfitting. Old warning-tier (3.5x) inflated 0.22 -> 0.77 on ~25% of
    # trials, corrupting the TPE surrogate landscape.
    threshold_warning: 15.0
    threshold_critical: 30.0
    penalty_multiplier: 2.5

    dollar_space_thresholds:
      critical: 15.0
      warning: 10.0
      moderate: 6.0

    dollar_space_penalties:
      critical: 1.8
      warning: 1.4
      moderate: 1.2

  logging:
    performance: true
    memory: true
    gpu_memory: true
    trial_params: true
    diagnostic_interval: 5
    save_study_interval: 0

  # 50k-scale: versioned to  to prevent load_if_exists from resuming the old 1300-sample study.
  # TPE surrogate fit on 1300-sample trials has wrong priors for 50k — a resumed study would
  # bias all new trials toward under-regularized configurations discovered at small scale.
  study_name_template: insurance_optimization_{model}
  storage: "sqlite:///models/optuna_studies.db"
  load_if_exists: true  # safe now — new DB name guarantees a clean study on first run

  gpu:
    batch_size: 50000  # 50k-scale: raised from 10000 to match full dataset size for histogram construction

  cv_requirements:
    min_successful_folds: 3
    min_success_rate: 0.6

  constrained_params:
    # Linear models
    ridge:
      alpha: [0.01, 100.0]

    lasso:
      alpha: [0.001, 10.0]
      tol: [0.0001, 0.01]

    elastic_net:
      # QuantileRegressor params — alpha is L1 regularization (NOT quantile level)
      # quantile is fixed at 0.60 in models.elastic_net and is not tuned by Optuna
      alpha: [0.001, 10.0]

    # Gradient Boosting
    gradient_boosting:
      n_estimators: [100, 500]
      learning_rate: [0.01, 0.2]
      max_depth: [3, 7]
      min_samples_split: [100, 500]   # 50k-scale: raised from [10,50]. Absolute count; 10/50k = 0.02% = no guard.
      min_samples_leaf: [50, 200]     # 50k-scale: raised from [5,30].
      subsample: [0.6, 0.95]
      ccp_alpha: [0.0, 0.1]
      # alpha intentionally NOT listed here (v7.4.3) — fixed at models.gradient_boosting.alpha = 0.65.

    # SVR
    svr:
      C: [0.1, 100.0]
      epsilon: [0.01, 1.0]
      degree: [2, 4]
      tol: [0.0001, 0.01]

    # KNN
    knn:
      n_neighbors: [3, 50]
      leaf_size: [20, 50]
      p: [1, 2]

    xgboost:
      objective: reg:quantileerror   # fixed injection — not tuned, just enforced in every trial
      # quantile_alpha intentionally NOT listed here (v7.4.3 — v7.5.4).
      # Alpha is fixed at models.xgboost.quantile_alpha = 0.45 (v7.5.4: lowered from 0.57
      # to compensate for YJ nonlinearity mapping log-space quantile to dollar-space).

      n_estimators: [300, 500]
      max_depth: [3, 5]
      learning_rate: [0.04, 0.10]

      # ISSUE 4b FIX (retained): Best trial (trial 45) used reg_alpha=1.58,
      # reg_lambda=4.76 — all near the previous lower bounds. Floors raised
      # on leaf-weight regularization (reg_alpha, reg_lambda) to push Optuna
      # away from the under-regularized regime that caused 7.4% pinball gap.
      reg_alpha: [2.0, 8.0]
      reg_lambda: [3.0, 12.0]

      # NEW ISSUE B FIX: gamma and min_child_weight control split complexity
      # directly. In the previous run both were raised simultaneously with
      # reg_alpha/reg_lambda, reducing model capacity enough to hurt the
      # high-value segment (R² 0.605 → 0.5385) because the extreme
      # smoker×BMI×age interactions need deep, narrow splits that tighter
      # gamma/min_child_weight suppresses first.
      # Reverted to original lower bounds while keeping reg_alpha/reg_lambda
      # tighter. The two regularization axes are now decoupled:
      #   reg_alpha/reg_lambda → leaf weight magnitude (kept tighter)
      #   gamma/min_child_weight → split complexity  (original range)
      gamma: [0.5, 2.0]
      min_child_weight: [50, 300]   # 50k-scale: raised from [5,15]. Absolute count; [5,15]/50k ≈ 0.01-0.03% = no regularization.

      subsample: [0.65, 0.85]
      colsample_bytree: [0.6, 0.8]
      colsample_bylevel: [0.4, 0.7]
      colsample_bynode: [0.4, 0.7]

      max_bin: [512, 2048]     # 50k-scale: raised from [128,512]. Old ceiling was row-count-constrained
                               # (~640 rows/fold → effective max ~400 bins). At 50k, ~40k rows/fold; full range used.
      max_leaves: [10, 25]
      # scale_pos_weight intentionally absent (v7.4.5): binary classification parameter,
      # incompatible with reg:quantileerror. Removed from config.py validator (required_xgb
      # in get_optuna_config) so it no longer needs to appear here. Keeping it would
      # cause Optuna to waste a search dimension suggesting a value XGBoost ignores.
      # FIX-2 (v7.4.4): was [0, 0] — XGBoost reg:quantileerror REQUIRES max_delta_step > 0.
      # Value 0 disables the gradient-step constraint, causing NaN predictions / ValueError
      # on every trial (silently swallowed by the old exception handler → all trials pruned).
      # Range [1, 3]: 1 is XGBoost default; 3 allows mild upward tuning for stability.
      max_delta_step: [1, 3]

    # FIX-1b: xgboost_median pricing model (reg:squarederror, symmetric loss).
    # Required so OptunaOptimizer._suggest_constrained_params() finds a param
    # block for this model name. Without this block, is_tree_model=True (Fix 1a)
    # routes to the constrained path but model_config is empty → zero params →
    # all 50 trials identical → 550% train/val RMSE overfitting gap.
    #
    # Key differences from constrained_params.xgboost (quantile):
    #   - objective: reg:squarederror (symmetric RMSE, not quantile)
    #   - max_delta_step: [0, 0]  (gradient clipping only needed for quantile loss)
    #   - reg_alpha/reg_lambda: wider range (pricing doesn't need quantile tail control)
    #   - n_estimators: wider range (more capacity useful for mean prediction)
    xgboost_median:
      objective: reg:squarederror     # fixed injection — symmetric loss for pricing
      n_estimators: [200, 600]
      max_depth: [3, 6]
      learning_rate: [0.03, 0.10]
      reg_alpha: [0.1, 5.0]
      reg_lambda: [1.0, 10.0]
      gamma: [0.1, 3.0]
      min_child_weight: [30, 200]    # 50k-scale: raised from [2,20]. Absolute count scaling.
      subsample: [0.65, 0.85]
      colsample_bytree: [0.60, 0.85]
      max_bin: [512, 2048]           # 50k-scale: raised from [128,512]. Row-count cap no longer applies.
      max_leaves: [10, 30]
      max_delta_step: [0, 0]    # 0 = disabled; safe for RMSE (NaN instability is quantile-only)

    lightgbm:
      objective: quantile            # fixed injection — not tuned, just enforced in every trial
      # alpha intentionally NOT listed here (v7.4.3).
      # Same reason as xgboost: RMSE objective always pulls alpha to the floor.
      # Alpha is fixed at models.lightgbm.alpha = 0.65; Optuna cannot override it.
      n_estimators: [100, 500]
      max_depth: [4, 8]
      learning_rate: [0.01, 0.1]
      num_leaves: [64, 256]         # 50k-scale: raised from [48,160]. 2^8=256 leaves is safe with 50k+ samples.
      # FIX-3 (v7.4.4): min_child_samples REMOVED — it is a LightGBM alias for
      # min_data_in_leaf. Passing both to LGBMRegressor(**params) raises
      # LightGBMError "Found duplicated parameter: min_data_in_leaf" on every
      # trial, crashing silently as TrialPruned under the old exception handler.
      # Range widened to [5, 60] to cover the full original search space of both.
      min_data_in_leaf: [50, 500]   # 50k-scale: raised from [5,60]. Absolute count; 5/50k = 0.01% — zero regularization.
      min_split_gain: [0.0, 0.20]
      subsample: [0.7, 0.9]
      subsample_freq: [0, 10]
      colsample_bytree: [0.7, 0.9]
      reg_alpha: [0.03, 3.0]
      reg_lambda: [1.0, 6.0]
      min_child_weight: [0.001, 10.0]

    random_forest:
      n_estimators: [200, 500]
      max_depth: [5, 15]
      min_samples_split: [100, 500]   # 50k-scale: raised from [10,50]. Absolute count scaling.
      min_samples_leaf: [50, 200]     # 50k-scale: raised from [5,20].
      max_features: [sqrt, log2]
      bootstrap: true
      oob_score: true

  file_lock:
    timeout: 30.0

# ====================================================
# CONFORMAL PREDICTION CONFIGURATION
# ====================================================
# calibration_split_ratio controls the 80/20 conformal split inside
# train_single_model (uncalibrated path):
#   conformal calibration set = val × (1 - ratio) = 268 × 0.80 = ~214 samples
#   holdout set               = val × ratio        = 268 × 0.20 =  ~54 samples
#
# 214 samples → 214 // 30 = 7 bins (vs 5 bins at the old 0.40 ratio).
# Two extra bins improve tail resolution for skew=+3.14, kurtosis=12.58 residuals.
# Expected CI width reduction: ~15–25%.
# Coverage guarantee is unaffected — marginal validity requires only
# exchangeability, not a specific n_cal.
#
# NOTE: This same key is also read by the calibrated model path in
# train_single_model (calibrated-isotonic branch) where the semantics
# are inverted: it is the holdout fraction (keep at ≤0.40 so the
# isotonic fitter still gets ≥ 160 samples). The 0.20 value is safe
# for both paths: calibrated path gets 268×0.80=214 calibration samples.
conformal:
  calibration_split_ratio: 0.20   # 80% calibration / 20% holdout (unchanged from v7.5.0)
  # 50k-scale arithmetic (val ≈ 10,000 at val_size=0.20):
  #   n_cal = 10,000 × 0.80 = 8,000 → 8000//30 = 266 heteroscedastic bins
  #   holdout = 10,000 × 0.20 = 2,000 — well above the 30-sample guard
  # The original 0.20 value was chosen to push 1300-sample n_cal from 213→272 (7→9 bins).
  # At 50k that concern is gone; 0.20 is kept because it is valid for both code paths.
  # ⚠️ DUAL-SEMANTICS INVERSION RISK: both code paths treat this as the holdout
  # fraction, but with opposite labelling in surrounding comments/variables.
  # Recommended long-term fix: split into two independent keys:
  #   conformal.uncalibrated_split_ratio   (current uncalibrated path)
  #   conformal.calibrated_split_ratio     (calibrated-isotonic path)

# ====================================================
# TRAINING CONFIGURATION
# ====================================================
training:
  output_dir: models
  reports_dir: reports
  # CI-WIDTH FIX (original, 1300-sample context — preserved for history):
  # Split rebalancing raised val_size 0.25→0.30 to increase n_cal 213→272 (7→9 bins).
  # That fix is no longer needed at 50k: val_size=0.20 → n_cal ≈ 8,000 → 266 bins.
  # n_cal is now four orders of magnitude past the binning floor; val_size is reduced
  # to 0.20 to reclaim ~4,250 training rows (42,500→42,500+4,250 = 46,750 train rows).
  #
  # 50k split arithmetic (test_size=0.15, val_size=0.20):
  #   train ≈ 32,500  val ≈ 10,000  test ≈ 7,500
  #   n_cal = val × 0.80 ≈ 8,000 → 8000//30 = 266 bins  ✅ far beyond any CI-width risk
  #   holdout = val × 0.20 ≈ 2,000 — well above 30-sample guard
  #   Both values within validation bounds: test_size ∈ [0.05,0.5] ✅  val_size ∈ [0.10,0.50] ✅
  test_size: 0.15
  val_size: 0.20    # 50k-scale: reduced from 0.30. n_cal ≈ 8,000 >> 9-bin floor; reclaims ~4k training rows.
  stratify_splits: true
  min_r2_threshold: 0.0
  enable_mlflow: true
  enable_optuna: true
  enable_diagnostics: true
  training_timeout: 7200   # 50k-scale: raised from 3600. 5 models × 5-fold CV on 50k takes 2-4h total.
  max_model_size_mb: 500.0
  max_memory_mb: 14336.0   # 50k-scale: raised from 12800. Larger model footprints + 50k feature matrices.
                           # ~14GB ceiling on 16GB RAM; OS + CUDA context consume ~1.5-2GB.
  memory_fraction: 0.9
  verify_checksums: true
  save_checksums: true
  register_to_mlflow: true
  halt_on_severe_shift: false
  batch_size: 50000   # 50k-scale: raised from 10000 to match full dataset

  checkpoint:
    enabled: true
    frequency: 1
    save_optimizer_state: false

  memory:
    cleanup_frequency: per_model
    force_gc: true
    clear_gpu_cache: true
    monitor_interval: 10

  early_stopping:
    enabled: true
    patience: 50
    min_delta: 0.0001
    restore_best_weights: true


  two_model_architecture:
    enabled: true
    pricing_model: xgboost_median
    risk_model: xgboost
    overpricing_gate_model: xgboost_median
    # risk_model_alpha: train.py reads this for the TMA log header.
    # If absent, falls back to models.xgboost.quantile_alpha.
    # MUST stay in sync with models.xgboost.quantile_alpha (currently 0.30).
    # Was 0.57 — not updated when quantile_alpha was lowered to 0.30 (v7.5.4).
    # Stale value caused TMA log headers to report wrong alpha, creating
    # misleading provenance in MLflow run names.
    risk_model_alpha: 0.30

  provenance:
    capture_git_hash: true
    require_clean_tree: false
    random_state_in_artifact: true
    always_write_bias_correction: true

  conformal_intervals:
    method: cqr_mapie
    fallback: symmetric_conformal
    target_coverage: 0.90
    max_width_ratio: 2.0
    target_width_ratio: 1.50

  deployment_gates:
    g6_min_cost_weighted_r2: 0.75
    # BUG-6 FIX: raised from 0.55 → 0.62 for reg:squarederror (xgboost_median).
    # Mean > median for right-skewed insurance charges (mean/median ≈ 1.40×), so
    # a perfectly fitted squarederror model has >50% overpricing by design.
    # 55% is structurally unreachable without aggressive Low-tier bias correction
    # that breaks Very High segment actuarial balance.  62% is the empirical
    # steady-state rate with the current 3-tier correction.
    # To reach ≤55% correctly: switch objective to reg:quantileerror α=0.50.
    g7_max_overpricing_rate: 0.62
    g3_max_width_ratio: 1.50

  use_sample_weights: true
  high_value_percentile: 75

# ====================================================
# DIAGNOSTICS CONFIGURATION
# ====================================================
diagnostics:
  enabled: true
  max_samples: 100
  batch_size: 10000
  rf_tree_batch_size: 100

  enable_confidence_intervals: true
  confidence_level: 0.90  # v7.5.1: aligned with training.conformal_intervals.target_coverage=0.90.
                           # Previously 0.95 — mismatch caused heteroscedastic_conformal to target
                           # a stricter quantile than the CQR/MAPIE path intended, inflating avg CI
                           # width from ~$35K (design) to ~$171K (observed). Both paths now 0.90.
  enable_shap: false
  auto_plot: true
  save_path: reports/explainability

  performance:
    enabled: true
    log_memory: true
    log_gpu_memory: true
    log_training_time: true
    log_prediction_time: true

  plots:
    learning_curves: true
    residuals: true
    error_distribution: true
    calibration: true
    feature_importance: true
    partial_dependence: true
    shap: false
    save: true
    format: png
    dpi: 300

  reports:
    html: true
    pdf: true

  display:
    top_features_pdp: 6
    worst_predictions_show: 5
    distribution_shift_top_features: 10
    min_sample_for_save: 100

  sampling:
    shap_max_samples: 1000
    shap_background_samples: 100
    residual_sample_size: 5000
    autocorr_lag_limit: 40
    calibration_bins: 15
    learning_curve_points: 10
    permutation_importance_repeats: 10
  # Note: shap_max_samples and shap_background_samples are defined under sampling above

# ====================================================
# MLFLOW CONFIGURATION
# ====================================================
mlflow:
  tracking:
    enabled: true
    tracking_uri: ./mlruns
    experiment_name: insurance_prediction
    run_name_prefix: enhanced_eval_run

  registry:
    enabled: true
    model_name: insurance_predictor_enhanced
    stages: [staging, production, archived]
    register_best_only: true

  logging:
    level: INFO
    log_metrics: true
    log_params: true
    log_artifacts: true
    log_models: true
    log_system_metrics: true

  autolog:
    sklearn: true
    xgboost: true
    lightgbm: true
    disable: true
    log_input_examples: true
    log_model_signatures: true

  log_gpu_metrics: true
  gpu_metrics:
  - gpu_utilization
  - gpu_memory_used
  - gpu_memory_free
  - gpu_temperature

# ====================================================
# HIGH-VALUE SEGMENT ANALYSIS
# ====================================================
high_value_analysis:
  enabled: true
  threshold_percentile: 75
  baseline_model: linear_regression
  compare_against_baseline: true
  custom_threshold:

  reporting:
    save_report: true
    format: json

# ====================================================
# OVERFITTING ANALYSIS - STRICTER THRESHOLDS
# ====================================================
overfitting_analysis:
  enabled: true

  thresholds:
    excellent: 3.0
    good: 6.0
    warning: 10.0
    critical: 15.0

  remediation:
    auto_adjust_params: false
    suggest_fixes: true
    log_detailed_analysis: true

# ====================================================
# MONITORING & OBSERVABILITY
# ====================================================
monitoring:
  # canonical key read by predict.py (dual-key fallback added in config compat fix)
  drift_detection: true
  # legacy alias — kept for backward compat with older predict.py versions
  drift_detection_enabled: true
  # Path to JSON produced by DriftMonitor.create_baseline() after training.
  # predict.py reads this key; defaults to 'models/drift_baseline.json' if absent.
  baseline_path: models/drift_baseline.json
  # Gates the per-batch summary log in HybridPredictor.predict().
  # predict.py defaults to True if this key is absent — declared here for clarity.
  enabled: true
  alert_threshold: 0.1
  alert_on_drift: true
  alert_on_performance_degradation: true
  alert_email:
  prediction_log: logs/predictions.csv
  metrics_log: logs/metrics.json
  track_inference_time: true
  track_memory_usage: true
  track_gpu_usage: true
  log_retention_days: 30
  metrics_retention_days: 90

# ====================================================
# HYBRID ML + ACTUARIAL PREDICTOR - v7.3.1 PRODUCTION
# ====================================================

hybrid_predictor:
  enabled: true

  # ====================================================
  # VALIDATED OPTIMAL CONFIGURATION
  # ====================================================
  # Routing threshold — uses actuarial predictions as signal, not ML predictions.
  # Raising this pushes MORE policies onto the actuarial path (counter-intuitive).
  # Lowering it shrinks the actuarial-dominant zone, reducing actuarial over-pricing
  # exposure and churn in the transition band.
  #
  # v7.5.5: lowered from 9500.0 → 7500.0.
  # Root cause of hybrid churn (5.06% vs ML 3.94%): non-smoker policies with
  # act_preds in [$8,500, $9,500] were routing as actuarial-dominant (ml_weight=0.70),
  # exposing them to 30% actuarial over-pricing.  At $7,500 those policies route
  # ML-dominant (ml_weight=1.0) — zero actuarial influence, zero churn contribution.
  #
  # Effect on smokers: none.  smoker_multiplier=3.5 ensures act_preds >> $9,500 for
  # every smoker regardless of threshold — they were already ML-dominant before.
  #
  # Tuning guide:
  #   Raise toward $8,000 if underpricing rate rises > 55% after re-evaluation.
  #   Lower toward $6,500 if churn rate remains above ML baseline post-evaluation.
  #   At $5K: historical note (rationale.threshold_5000) shows 202 policies shifted
  #   to actuarial path (from 129), collapsing BizScore — do not go below $6,500.
  threshold: 7500.0

  # v7.5.4: lowered from 0.75 to 0.70.
  # Low segment (true charge < $5K) shows 83.9% ML overpricing — xgboost_median
  # systematically over-predicts cheap policies under MSE loss with right-skewed targets.
  # Actuarial formula (base + age*coef + ...) prices low-risk cases more conservatively.
  # Increasing actuarial weight from 25% to 35% in the blend zone reduces ML dominance
  # for the 33 blended/actuarial-dominant policies in the test set.
  # Monitor: if profit_per_policy drops below $1,200 → revert to 0.70.
  #          if Low SMAPE improves > 3pp → further reduce to 0.60.
  blend_ratio: 0.70

  use_soft_blending: true
  soft_blend_window: 1000.0  # Transition band: $6,500–$7,500 at current threshold

  # Churn cap — actuarial path cannot inflate a prediction beyond this multiple
  # of the ML prediction.  Prevents actuarial over-conservatism from triggering
  # customer churn via sustained overpricing.  Applied post-blend in
  # _blend_predictions() via np.minimum(final, ml_preds * max_actuarial_uplift_ratio).
  # 1.15 matches the actuarial conservativeness alert threshold already used in
  # predict() diagnostics (actuarial_vs_ml_ratio > 1.15).
  #
  # C-01 FIX: restored to 1.15 (documented intent and predict.py default).
  # Previous value of 1.45 made the cap effectively inactive for the $7,500–$18,037
  # transition zone (actuarial over-prices ~20–30% there), directly causing the
  # observed 6.44% churn rate (vs ML baseline 3.95%).  The cap comment explicitly
  # stated "tighten to 1.10 if churn_rate rises above 2%" — the value was 45pp
  # above that ceiling.
  # Tuning guide:
  #   Tighten to 1.10 if churn_rate rises above 2% in monitoring.
  #   Relax  to 1.20 if actuarial corrections for high-risk policies are clipped too aggressively.
  max_actuarial_uplift_ratio: 1.10

  # T2-B (v7.5.0): ML-relative floor guard — symmetric counterpart to the
  # churn cap above.  When the actuarial formula systematically under-prices a
  # segment (VH at 0.608x ML confirmed by notebook 05_vh_analysis.ipynb), the
  # blend can be dragged below ML with no lower bound.  This guard prevents the
  # final blend from falling more than (1 - min_actuarial_floor_ratio) below ML.
  #
  # Default 0.75: fires only when blend < 0.75*ml, i.e. when actuarial falls
  # below ~0.167*ml.  With blend_ratio=0.70: blend = 0.70*ml + 0.30*act, so
  # the floor fires only when act < 0.167*ml — an extreme edge case.  For the
  # VH segment at act=0.608*ml: blend = 0.882*ml, well above 0.75.  This is a
  # safety net for OOD inputs, not a regular-firing adjustment.
  #
  # REPLACES the previous actuarial-fraction floor (min_actuarial_fraction_floor=0.55)
  # which anchored on act_preds.  Anchoring on the miscalibrated actuarial signal
  # caused the floor to over-fire for false-alarm tail-risk policies (young low-BMI
  # smokers where smoker_multiplier=3.5 inflates actuarial above true charges).
  # ML-relative anchoring avoids this coupling.
  #
  # Tuning guide:
  #   Raise to 0.80 for tighter underpricing protection.
  #   Lower to 0.65 if the floor fires too often on legitimate actuarial-dominant policies.
  #   Monitor: if severe_underpricing_count rises after config change → raise this value.
  min_actuarial_floor_ratio: 0.75

  # DEPRECATED (v7.5.0): min_actuarial_fraction_floor anchored on actuarial predictions.
  # Superseded by min_actuarial_floor_ratio (ML-relative) above.  Left here for
  # historical reference — NOT read by predict.py v6.3.3+.
  # min_actuarial_fraction_floor: 0.55

  # ====================================================
  # CALIBRATION - CRITICAL FOR PROFITABILITY
  # ====================================================
  calibration:
    enabled: true
    # FIX-4 (v7.5.0-patch5b): per-model calibration factors.
    #
    # Previous single factor=1.02 caused G7 failures on both models:
    #   Pricing model (squarederror): raw ~50% overpricing x1.02 = ~77%  [G7 >55% FAIL]
    #   Risk model   (quantile 0.65): raw ~65% overpricing x1.02 = ~76%  [advisory >75%]
    #
    # Root cause: reg:squarederror is the unbiased mean estimator by construction.
    # No global uplift is needed — 3-tier BiasCorrection handles segment-level correction.
    # reg:quantileerror at alpha=0.65 intentionally overshoots the median; the 1.02 factor
    # pushed it above the ±10pp tolerance band ceiling of 75%.
    #
    # New values:
    #   pricing_factor = 1.00  raw ~50% stays at ~50%; after BC approx 50% -> G7 <=55% pass
    #   risk_factor    = 0.97  raw ~65% -> ~63%; within [55%, 75%] pass
    #
    # Tuning guide:
    #   If MAPE regresses post-retrain: nudge pricing_factor toward 1.01
    #   If risk overpricing drops below 60%: nudge risk_factor toward 0.99
    factor: 1.00          # legacy single-model fallback (unused with two_model_arch)
    pricing_factor: 1.00  # reg:squarederror (xgboost_median) -- unbiased; no uplift needed
    risk_factor: 0.97     # reg:quantileerror alpha=0.65 (xgboost) -- nudges into [55%, 75%]

    # apply_to_ml_only: true — calibration corrects ML systematic underpricing only.
    # The actuarial formula produces its own scale (confirmed 0.87x ML after v7.3.1 tuning).
    # Applying calibration to the full hybrid would inflate already-scaled actuarial predictions.
    apply_to_ml_only: true

    use_adaptive: false
    segment_specific: false

  # ====================================================
  # BUSINESS CONFIGURATION - FIXED PENALTY LOGIC
  # ====================================================
  # ⚠️ CRITICAL: underpricing_penalty_multiplier MUST match
  #              evaluation.cost_analysis.asymmetric_penalties.underpricing_multiplier
  # ====================================================
  business_config:
    profile: realistic_insurance_v2

    # Revenue parameters
    base_profit_margin: 0.15  # 15% margin (realistic for insurance)
    admin_cost_per_policy: 25.0  # $25/policy (achievable with automation)

    # Customer churn modeling
    churn_threshold_pct: 0.40  # 40% overpricing triggers churn risk
    churn_sensitivity: 1.0  # Formula: excess_overpricing_fraction × sensitivity → churn_probability. See rationale.churn_sensitivity_10.
    customer_acquisition_cost: 200.0  # $200 CAC
    customer_lifetime_value_multiplier: 1.5  # CLV = 1.5x annual premium

    # ✅ CRITICAL: Must match evaluation.cost_analysis.asymmetric_penalties.underpricing_multiplier
    underpricing_penalty_multiplier: 0.3  # 30% of underpricing amount
    underpricing_penalty_cap_pct: 0.2  # Never exceed 20% of premium
    severe_underpricing_threshold_pct: 0.50  # >50% underpricing is severe
    severe_underpricing_penalty: 200.0  # $200 additional penalty

    # Accuracy rewards
    acceptable_error_band_pct: 0.30  # ±30% error is acceptable
    excellent_accuracy_bonus: 150.0  # $150 bonus for accurate predictions

    # Additional business thresholds
    low_value_threshold: 4500.0  # Threshold for low-value segment
    high_value_multiplier: 1.5  # Multiplier for high-value policies

    # FIX F-12: BizScore scoring thresholds for _calculate_business_value_score().
    # Previously these were Python-only dataclass defaults in evaluate.py
    # BusinessConfig — invisible to config.yaml governance and untunable without
    # a code edit.  Now declared here so operators can tune them without deploys.
    # evaluate.py BusinessConfig.from_config_dict() reads these via .get() with
    # the same values as fallback — fully backward compatible.
    # FIX: raised from 500.0 → 600.0 to calibrate against the actual 50k-portfolio
    # ML baseline ($615/policy).  At 500.0 both ML ($615) and hybrid ($677) exceeded
    # the target identically, making the $62/policy profit difference invisible to
    # the gate (both scored 50/50 on profitability).
    # At 600.0 the ML baseline sits just above the threshold — both models still
    # exceed it in the current run, so profitability_score remains 50/50 for both.
    # The profit gap only becomes visible in the gate once this value is raised above
    # the hybrid profit/policy ($677), which requires the actuarial VH fix first
    # (churn must drop to ~3% before a higher target can be justified).
    # Tuning guide: after smoker×BMI×age interaction is added and churn drops to <3%,
    # revisit raising to 650–700 to expose hybrid's profit advantage in BizScore.
    biz_score_profit_target: 680.0    # profitability_score = 50 at/above this $/policy
    biz_score_churn_low: 0.10         # full retention score when churn_rate < this
    biz_score_churn_high: 0.20        # zero retention score when churn_rate > this
    biz_score_retention_max: 30.0     # max retention component (out of 100)
    biz_score_quality_weight: 20.0    # accuracy-rate multiplier (out of 100)

    # M-07 FIX: governance bounds for the combined correction factor.
    # HybridPredictor.predict() validates that
    #   median(hybrid_predictions / raw_ml_predictions)
    # stays within [combined_correction_min, combined_correction_max].
    # This catches silent compounding of BiasCorrection × calibration_factor
    # that can reach +30%+ for the high tier without operator visibility.
    # Previously these fell back to hardcoded defaults (1.45 / 0.65) because
    # neither key existed in config — making the governance range invisible
    # to operators and untunable without a code change.
    combined_correction_max: 1.45   # BiasCorrection × calibration_factor upper bound
    combined_correction_min: 0.65   # BiasCorrection × calibration_factor lower bound

  # ====================================================
  # ACTUARIAL FORMULA PARAMETERS
  # ====================================================
  # Absolute cost components scaled ×1.35 vs original values to correct the
  # 0.61x actuarial/ML ratio observed pre-tuning. Achieved ratio: 0.87x (Run 3).
  # Ratios (smoker_multiplier, region_multipliers) are unchanged — scaling those
  # would distort relative risk factors, not the absolute premium level.
  # Formula: base + age*coef + max(bmi-25,0)*penalty + children*cost
  #          × smoker_multiplier × region_multiplier
  # ====================================================
  actuarial_params:
    base: 3038                           # × 1.087
    age_coefficient: 59.0                # × 1.087 = 59.02, rounded
    bmi_threshold: 25                    # unchanged (it's a threshold, not a cost)
    bmi_penalty: 118.2                   # × 1.087 = 118.15, rounded
    children_cost: 675                   # × 1.087 = 675.03, rounded
    smoker_multiplier: 3.5               # unchanged — dimensionless ratio
    region_multipliers:                  # unchanged — dimensionless ratios
      northeast: 1.05
      southeast: 1.02
      northwest: 0.97
      southwest: 1.00
    smoker_bmi_age_coeff: 8.0

  # ====================================================
  # PERFORMANCE MONITORING
  # ====================================================
  monitoring:
    enabled: true
    log_component_predictions: true  # Log ML vs actuarial predictions
    track_blend_distribution: true  # Track usage of each component
    log_calibration_applied: true  # Track calibration effects

    # ✅ ENHANCED: Track new evaluation metrics
    track_smape: true  # Track SMAPE metric
    track_male: true   # Track MALE metric
    track_segment_metrics: true  # Track segment-level performance
    track_cost_breakdown: true   # Track cost analysis components

    # Business metrics monitoring (CRITICAL for production)
    business_metrics:
      enabled: true
      log_interval: 100  # Log every 100 predictions
      track_profitability: true  # Calculate running profit estimate
      alert_on_negative_profit: true  # Alert if losses detected
      alert_threshold: -10000  # Alert if cumulative loss > $10K

      # FIX L5: expected_ranges updated to current actuals (2026-04-12, n=7701).
      # Previous ranges were from Run 3 (n=268) and would permanently fire alerts
      # on every production batch since churn_rate_pct actual=6.44% vs old upper=2.0%.
      # Current ranges are interim production baselines; narrow them as churn improves
      # via the VH segment actuarial fix (see roadmap: smoker×BMI×age interaction term).
      expected_ranges:
        profit_per_policy: [500, 1500]   # actual: $731; target >$900 after VH fix
        churn_rate_pct: [0.0, 8.0]       # actual: 6.44%; target <3% after actuarial VH fix
        business_score: [65, 100]        # actual: 73.2; target >80 after churn reduction

  # ====================================================
  # EVALUATION SETTINGS (Basic - Extended by global evaluation section)
  # ====================================================
  evaluation:
    default_test_size: 0.2  # 20% test split
    random_state: 42  # For reproducibility
    output_dir: reports

    # ✅ Segment thresholds (also defined in global evaluation section)
    segment_thresholds:
      low_value: 4500.0      # Policies under this = low risk
      standard: 15000.0      # Mid-tier policies
      high_value: 30000.0    # High-cost policies

    # Optional: metric preferences
    primary_metric: net_profit    # was: smape — see evaluation.metrics comment above
    min_segment_samples: 10  # Minimum samples for reliable segment metrics

    # FIX L4: optimal_config_source updated to current version.
    use_optimal_config: true
    optimal_config_source: config_v7.5.0  # was: config_v7.3.1 (stale)

  # ====================================================
  # DEPLOYMENT METADATA
  # FIX L4: Updated to reflect current v7.5.0 evaluation results.
  # Previous values were from Run 3 (2026-02-27) with test_set_size=268.
  # Current results are from evaluate.py run dated 2026-04-12, test_set=7701.
  # ====================================================
  deployment:
    version: 7.5.0
    validated_date: '2026-04-12'

    validation_results:
      test_set_size: 7701
      evaluation_date: '2026-04-12'

      optimal_configuration:
        calibration_factor: 1.00      # pricing_factor for xgboost_median (reg:squarederror)
        threshold: 7500               # v7.5.5: lowered from 9500 — ⚠️ pending re-evaluation via evaluate.py
        blend_ratio: 0.70
        soft_blend_window: 1000

      # 2026-04-14 actuals (evaluate.py v7.5.0 run, n=7701)
      achieved_metrics:
        net_profit_hybrid: 5201534    # vs ML: $4,715,903 (+$485,631)
        profit_per_policy: 731        # vs ML: $612 (+$119)
        business_score_hybrid: 73.2   # vs ML: 81.5 (⚠️ lower due to churn)
        churn_rate_pct: 5.04          # vs ML: 3.95% (⚠️ elevated — root cause: actuarial overpricing in transition zone)
        rmse_hybrid: 3947             # vs ML: $3,944 (+$3 acceptable)
        actuarial_ml_ratio: 1.00      # within normal range overall; VH=0.608x (known issue)
        effective_ml_weight_pct: 82   # above configured 70% due to premium routing
        ci_empirical_coverage: 0.910  # nominal 0.90, gap +0.010 (valid)
        ci_mean_width: 11859          # 92% of mean premium — wide; disclosed to consumers

      projected_annual_profit:
        # At $731/policy actuals
        policies_1000: 731000
        policies_5000: 3655000
        policies_10000: 7310000

    rationale:
      calibration_108: Reduced 1.15→1.08 — matches 9–11% ML underpricing; 1.15 overcorrected and tripled churn costs ($7,732→$35,200)
      threshold_5000: Kept at 5000 — routing is actuarial-prediction-based; raising to 8000 pushed 202 policies onto actuarial path (was 129), collapsing business score
      threshold_9500: Raised to 9500 — wider actuarial-dominant zone to capture mid-range non-smokers; caused 5.06% churn (vs ML 3.94%) due to actuarial over-pricing in [$8,500, $9,500] band
      threshold_7500: Lowered 9500→7500 (v7.5.5) — shrinks actuarial-dominant zone; policies with act_preds in [$6,500, $8,500] now ML-dominant (ml_weight=1.0); smokers unaffected (already ML-dominant at any threshold due to smoker_multiplier=3.5)
      blend_ratio_075: Raised 0.58→0.75 — actuarial confirmed 0.87x ML after scaling; ML must dominate blended zone
      actuarial_scaled_135x: Absolute cost components ×1.35 — corrected 0.61x actuarial/ML ratio to 0.87x (within ±15% normal range)
      churn_sensitivity_10: 'Fixed 0.01→1.0 — formula: excess_fraction × sensitivity; 0.01 required 5000% overpricing to reach 50% churn'
      apply_to_ml_only_true: Calibration targets ML systematic underprediction only; applying to full hybrid would inflate actuarial path

    # Known issues and limitations
    # FIX H1: known_limitations updated to current v7.5.0 actuals (2026-04-14).
    known_limitations:
    - ML model has systematic underpricing bias (~9-11%); calibration_factor=1.00 means no active correction — monitor MAPE by segment
    - VH segment actuarial/ML ratio=0.608x; smoker×BMI×age interaction term added (coeff=8.0) but has no effect on predictions — smoker_multiplier=3.5 ensures all smokers are already ML-dominant (act >> threshold), so the interaction only affects the actuarial_vs_ml_ratio diagnostic log
    - Churn rate 5.04% (vs ML 3.95%); elevated because actuarial-path over-prices non-smokers in the transition zone — threshold lowered from $9,500 → $7,500 (v7.5.5) to reduce actuarial-dominant exposure; re-run evaluate.py to confirm improvement
    - CI mean width $11,859 = 92% of mean premium — must be disclosed to downstream consumers
    - Business penalties (underpricing_penalty_multiplier=0.3) not validated against real historical loss data
    - Test set 7701 policies — metric variance acceptable; validate on 1000+ additional held-out set before re-deployment decision

    improvement_roadmap:
      high_priority:
      - Retrain LightGBM with asymmetric/Huber loss — fixes 9-11% underpricing at source, removes need for calibration band-aid
      - Validate business penalties (underpricing_penalty_multiplier=0.3) against real historical loss data
      - Run evaluation on 1000+ policy held-out set — current 268-policy test set has high metric variance

      medium_priority:
      - 'Segment-specific calibration: smokers (high-risk) vs non-smokers (low-risk) have very different systematic biases'
      - Replace linear actuarial formula with small GBM trained on sub-$5K segment
      - A/B test calibration factor 1.05 vs 1.08 in staging — may reduce churn further

      low_priority:
      - Implement adaptive calibration that recalibrates monthly from production data
      - Add reinforcement learning for dynamic pricing optimization
      - Build production monitoring dashboard with real-time profit tracking

    # Monitoring plan (first 90 days critical)
    monitoring_plan:
      daily:
      - Check cumulative profit vs. prediction
      - Monitor for calibration drift
      - Alert if any daily batch shows net loss
      - Track SMAPE/MALE metrics by segment

      weekly:
      - Compare actual vs predicted profitability
      - Validate churn rate assumptions
      - Review high-loss policies manually
      - Segment performance analysis

      monthly:
      - Recalibrate if profit deviates >10% from prediction
      - Segment analysis (profitable vs unprofitable segments)
      - Update actuarial parameters if needed
      - Review cost analysis trends

      quarterly:
      - Full model retraining with production data
      - Business penalty parameter optimization
      - Strategic review of hybrid vs ML-only performance
      - Statistical significance testing

    # FIX H1: success_metrics updated to current actuals and realistic near-term targets.
    success_metrics:
      must_achieve:
      - Positive net profit every month
      - Business score > 70
      - 'Churn rate < 8.0%  (current: 6.44% — target <3% after VH actuarial fix)'
      - All segments SMAPE < 35%

      target_performance:
      - Net profit > $500K/quarter (on ~800 policies, current run-rate implies ~$5.6M/7701)
      - Business score > 80
      - 'Profit per policy > $900  (current: $731 — improves after VH fix)'
      - SMAPE < 30% for all segments

      stretch_goals:
      - Net profit > $1M/quarter
      - Business score > 90
      - Profit per policy > $1200
      - 'Churn rate < 3%  (requires smoker×BMI×age interaction in actuarial formula)'
      - SMAPE < 20% for all segments

# ====================================================
# ENHANCED EVALUATION CONFIGURATION
# ====================================================
# This section extends hybrid_predictor.evaluation with detailed
# settings for the enhanced evaluation system.
#
# Integration points:
# - Uses segment_thresholds from hybrid_predictor.evaluation
# - Validates consistency with business_config parameters
# - Provides detailed metric configuration for SMAPE/MALE
# - Enables comprehensive segment and cost analysis
# ====================================================

evaluation:
  # ====================================================
  # SEGMENT THRESHOLDS (Config-Driven, No Hardcoding)
  # ====================================================
  # ⚠️ NOTE: These must match hybrid_predictor.evaluation.segment_thresholds
  # ====================================================
  segment_thresholds:
    low_value: 4500.0      # Policies under this = low risk
    standard: 15000.0      # Mid-tier policies
    high_value: 30000.0    # High-cost policies

    # Optional: Custom segment names for reports
    segment_names:
      low_value: Low Risk Customers
      standard: Standard Coverage
      high_value: High Risk Customers
      catastrophic: Catastrophic Cases

  # ====================================================
  # METRIC CONFIGURATION
  # ====================================================
  metrics:
    # FIX M6: primary_metric changed from "smape" to "net_profit".
    # The operator notes (OPERATOR NOTES section) explicitly state:
    #   "SMAPE/MALE: segment accuracy — use for drift detection, not deployment decisions"
    # Setting primary_metric: smape contradicts the documented decision framework
    # and misleads any tooling that reads this key for auto-selection.
    # Net profit is the primary deployment decision signal per the evaluation report.
    primary_metric: net_profit    # was: smape (contradicted operator notes)

    # Secondary metrics for monitoring
    secondary_metrics:
    - male
    - rmse
    - mae
    - r2

    # SMAPE configuration (insurance-appropriate)
    smape:
      threshold: 0.01  # $0.01 minimum denominator (✅ FIXED from 1e-10)
      warn_above_pct: 100.0  # Warn if SMAPE > 100%
      error_above_pct: 200.0  # Error if SMAPE > 200%
      log_diagnostics: true  # Log detailed diagnostics

    # MALE configuration (log-scale metric)
    male:
      fallback_to_log1p: true  # Use log1p for zero/negative values
      warn_above: 1.0  # Warn if MALE > 1.0
      excellent_threshold: 0.3  # MALE < 0.3 is excellent
      good_threshold: 0.5  # MALE < 0.5 is good

    # MAPE configuration (legacy, use SMAPE instead)
    mape:
      deprecated: true
      use_smape_instead: true
      still_calculate: true  # Calculate for backward compatibility

  # ====================================================
  # SEGMENT ANALYSIS CONFIGURATION
  # ====================================================
  segment_analysis:
    enabled: true

    # Sample size validation
    min_segment_samples: 10  # Warn if segment < 10 samples
    recommended_min_samples: 30  # Ideal minimum for stable metrics
    fail_on_insufficient_samples: false  # Warn but don't fail

    # Analysis modes
    use_business_thresholds: true  # Use $ amounts (vs percentiles)
    calculate_percentile_segments: false  # Also calculate percentile-based segments

    # Segment-specific metrics
    calculate_per_segment:
    - smape
    - male
    - rmse
    - mae
    - r2
    - net_profit
    - profit_per_policy
    - churn_rate_pct
    - business_value_score

    # Reporting
    include_in_report: true
    create_segment_plots: true
    save_segment_details: true

  # ====================================================
  # COST ANALYSIS CONFIGURATION
  # ====================================================
  cost_analysis:
    enabled: true

    # Asymmetric penalty configuration
    # ⚠️ CRITICAL: These must match hybrid_predictor.business_config values
    asymmetric_penalties:
      enabled: true

      # Underpricing penalty (MUST match business_config.underpricing_penalty_multiplier)
      underpricing_multiplier: 0.3  # ✅ Matches business_config value

      # Overpricing penalty (churn-based, always 1.0x)
      overpricing_multiplier: 1.0

      # Validation
      validate_consistency: true  # Check against business_config
      warn_on_mismatch: true
      fail_on_mismatch: false  # Warn but don't crash

    # Cost breakdown tracking
    track_components:
    - underpricing_cost
    - overpricing_cost
    - churn_cost
    - underpricing_penalty
    - accuracy_bonus
    - total_cost

    # Cost per policy metrics
    calculate_cost_per_policy: true
    calculate_cost_per_segment: true

    # Reporting
    include_in_report: true
    create_cost_plots: true

  # ====================================================
  # COMPARISON & BENCHMARKING
  # ====================================================
  comparison:
    # Compare ML vs Hybrid
    compare_ml_vs_hybrid: true

    # Statistical testing
    statistical_tests:
      enabled: true
      # T2-D (v7.5.0): test is now on per-policy net_profit (business signal),
      # not on absolute error (academic signal).  A hybrid that reduces MAE while
      # increasing underpricing penalties will no longer show as "significantly better".
      # The MAE-based test is retained in evaluate.py as a secondary diagnostic.
      test_type: paired_t_test    # Paired t-test: ML net_profit vs Hybrid net_profit
      confidence_level: 0.95
      warn_if_not_significant: true
      include_in_report: true

    # Benchmarking
    baseline_models:
    - linear_regression
    - ml_only

    # Configuration comparison (for --compare-configs)
    config_comparison:
      enabled: true
      output_dir: reports/config_comparisons
      save_results: true
      create_plots: true

      # Configurations to test
      vary_parameters:
      - threshold
      - blend_ratio
      - calibration_factor
      - soft_blend_window

  # ====================================================
  # REPORTING CONFIGURATION
  # ====================================================
  reporting:
    # Report generation
    generate_unified_report: true
    generate_segment_report: true
    generate_cost_report: true

    # Output formats
    formats:
    - txt       # Human-readable text
    - json      # Machine-readable
    - csv       # For spreadsheet analysis (segment metrics only)

    # Report content
    include_sections:
    - executive_summary
    - academic_metrics
    - business_metrics
    - segment_analysis
    - cost_analysis
    - statistical_tests
    - recommendations
    - calibration_impact

    # Visualizations
    create_plots: true
    plot_types:
    - business_score
    - smape_comparison
    - profit_comparison
    - churn_comparison
    - segment_performance
    - cost_breakdown
    - error_distribution
    - prediction_scatter

    plot_format: png
    plot_dpi: 300

    # Output directory
    output_dir: reports

    # File naming
    filename_template: unified_evaluation_{timestamp}
    include_timestamp: true

    # Report verbosity
    verbosity: detailed    # Options: "minimal", "standard", "detailed"

  # ====================================================
  # VALIDATION & ERROR HANDLING
  # ====================================================
  validation:
    # Data validation
    validate_data_quality: true
    min_test_samples: 50  # Minimum test set size
    warn_on_class_imbalance: true
    check_for_nulls: true
    check_for_infinities: true

    # Metric validation
    validate_metrics: true
    fail_on_invalid_metrics: false  # Warn but don't crash
    check_metric_ranges: true

    # Configuration validation
    validate_config_consistency: true
    check_business_config_alignment: true
    check_threshold_consistency: true

    # Error handling
    continue_on_segment_failure: true  # Don't stop if one segment fails
    continue_on_metric_failure: true   # Don't stop if one metric fails
    log_all_errors: true
    error_log_path: logs/evaluation_errors.log

  # ====================================================
  # PERFORMANCE & OPTIMIZATION
  # ====================================================
  performance:
    # Caching
    cache_predictions: true
    cache_metrics: true
    cache_ttl: 3600  # 1 hour

    # Parallel processing
    parallel_segment_analysis: false  # Sequential for memory efficiency
    n_jobs: 1  # Number of parallel jobs (1 for your 16GB RAM)

    # Memory management
    clear_memory_between_segments: true
    use_chunked_processing: false  # Not needed for insurance dataset
    chunk_size: 10000

    # Progress reporting
    show_progress: true
    progress_interval: 10  # Log every 10% progress

  # ====================================================
  # ADVANCED FEATURES
  # ====================================================
  advanced:
    # Calibration impact tracking
    track_calibration_effects: true
    decompose_calibration: true  # Separate calibrated vs uncalibrated
    log_calibration_distribution: true

    # Component analysis (ML + Actuarial + Calibration)
    track_component_contributions: true
    log_component_predictions: true
    analyze_blend_effectiveness: true

    # Reliability scoring
    calculate_prediction_reliability: true
    reliability_threshold: 0.8
    include_reliability_in_reports: true

    # Sensitivity analysis
    sensitivity_analysis:
      enabled: false  # Expensive, enable for deep analysis
      parameters_to_test:
      - calibration_factor
      - blend_ratio
      - threshold
      n_variations: 5

    # Cross-validation for evaluation
    use_cv_for_metrics: false  # Use single test set by default
    cv_folds: 5  # If enabled

    # Bootstrapping for confidence intervals
    bootstrap_confidence_intervals: false  # Expensive
    bootstrap_iterations: 1000
    confidence_level: 0.95

