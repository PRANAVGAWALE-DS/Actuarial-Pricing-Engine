# ============================================================
# CI — Insurance Pricing ML Pipeline
# Runs on every push and pull-request targeting main/develop.
#
# Lint stack mirrors .pre-commit-config.yaml exactly:
#   ruff check (lint + import order) → ruff format (black-compatible)
# This prevents CI passing on code that pre-commit would reject locally.
#
# COVERAGE THRESHOLD
# ──────────────────
# FIX [D8-P2] / FIX F-03: The actual enforced gate is:
#   [tool.coverage.report] fail_under = 30  (pyproject.toml)
# pytest addopts does NOT include --cov-fail-under. The gate is enforced
# by pytest-cov reading the [tool.coverage.report] section of pyproject.toml.
# The previous comment claimed "20" — the actual value in pyproject.toml is 30.
# Raise fail_under in pyproject.toml as coverage grows; do not duplicate here.#
# ACTIONS PIN POLICY
# ──────────────s────
# FIX [D8-P1]: All actions pinned to full commit SHAs. Mutable version tags
# (e.g. @v4) can be silently updated by an upstream attacker to point to
# malicious code that runs with secrets.GITHUB_TOKEN access.
#
# To update: gh release view --repo <action_repo> --json tagName,targetCommitish
# Dependabot (.github/dependabot.yml) keeps these updated automatically.
#
# SHA table (verify with gh before upgrading):
#   actions/checkout@v4.2.2        : 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/setup-python@v5.3.0    : 0aff6c21871a3920cfe21aede7701c48dd7de5b5
#   actions/cache@v4.2.0           : 1bd1e32a3bdc45362d1e726936510720a7c6158d
#   actions/upload-artifact@v4.4.3 : b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  RANDOM_SEED: "42"

jobs:
  # ----------------------------------------------------------
  # Stage 1 — Code Quality
  # Single tool: ruff replaces black + isort + flake8.
  # Version pinned to match pyproject.toml dev deps and
  # .pre-commit-config.yaml rev — all three stay in sync.
  # ----------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4  # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-lint-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff==0.8.0

      - name: ruff check — lint + import order
        # Config loaded from [tool.ruff.lint] in pyproject.toml
        run: ruff check src/ api/ app/ scripts/ tests/

      - name: ruff format — format check (no files modified)
        # Equivalent to black --check; config from [tool.ruff.format]
        run: ruff format --check src/ api/ app/ scripts/ tests/

  # ----------------------------------------------------------
  # Stage 2 — Type Safety
  # Config sourced from [tool.mypy] in pyproject.toml:
  #   python_version=3.11, ignore_missing_imports=true,
  #   disallow_untyped_defs=false (intentional — project is
  #   incrementally typed).
  # ----------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@v5  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4  # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-typecheck-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-typecheck-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt mypy==1.18.2 types-requests types-PyYAML

      - name: mypy — type check core package + API layer
        # Notebooks, scripts, and backup files are intentionally excluded.
        # Config loaded automatically from [tool.mypy] in pyproject.toml.
        run: mypy src/insurance_ml/ api/

  # ----------------------------------------------------------
  # Stage 3 — Tests + Coverage
  # pytest is invoked with NO extra flags — all configuration
  # lives in [tool.pytest.ini_options] in pyproject.toml:
  #   addopts includes --cov=insurance_ml, --cov-report=xml,
  #   --cov-report=term-missing, --tb=short.
  #
    # Coverage gate: fail_under = 30 in [tool.coverage.report]
    # (pyproject.toml). Enforced by pytest-cov reading that section.
  # Raise the threshold there as coverage grows.
  #
  # The coverage XML is uploaded as an artifact for badge
  # services or PR annotations if needed later.
  # ----------------------------------------------------------
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@v5  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4  # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-test-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-test-${{ runner.os }}-

      # FIX [NEW]: pytest-cov pinned to 6.1.0 to match pyproject.toml [dev].
      # The previous install used 7.0.0, creating a divergence between local
      # dev (which installs from pyproject) and CI (which installed from here).
      - name: Install dependencies
        run: pip install -r requirements.txt pytest==8.4.2 pytest-cov==6.1.0 coverage==7.10.7

      - name: Copy example env
        # CI has no real secrets — .env.example provides safe defaults
        run: cp .env.example .env

      - name: Run pytest
        # All flags (--cov, --tb=short, etc.) come from
        # [tool.pytest.ini_options].addopts in pyproject.toml.
        # Coverage gate comes from [tool.coverage.report].fail_under.
        # PYTHONPATH must include repo root so `src/insurance_ml` resolves.
        # CUDA_VISIBLE_DEVICES="" forces CPU mode — GitHub runners have no GPU.
        run: pytest tests/
        env:
          PYTHONPATH: ${{ github.workspace }}
          CUDA_VISIBLE_DEVICES: ""
          RANDOM_SEED: ${{ env.RANDOM_SEED }}

      - name: Upload coverage XML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ----------------------------------------------------------
  # Stage 4 — Model Regression Gate
  # ML-specific quality gate: trains on sample data, asserts
  # business metrics within config-derived thresholds.
  #
  # Thresholds are read directly from configs/config.yaml:
  #   g7_max_overpricing_rate = 0.62
  #   g6_min_cost_weighted_r2 (approximated via R² ≥ 0.70)
  #
  # Columns confirmed from config.yaml:
  #   numerical:   [age, bmi, children]
  #   categorical: [sex, smoker, region]
  #   target:      charges
  # ----------------------------------------------------------
  model-regression-gate:
    name: Model Regression Gate
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@v5  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4  # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-gate-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-gate-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Copy example env
        run: cp .env.example .env

      - name: Run model regression gate
        run: python scripts/ci_model_gate.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          RANDOM_SEED: ${{ env.RANDOM_SEED }}
          CUDA_VISIBLE_DEVICES: ""

      - name: Upload gate results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: gate-results
          path: reports/ci_gate_results.json
          retention-days: 7
